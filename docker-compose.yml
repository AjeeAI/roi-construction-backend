version: '3.8'

services:
  backend:
    build: ./roi-backend
    ports:
      - "8000:8000"
    env_file:
      - ./roi-backend/.env
    volumes:
      - ./roi-backend:/app
    # The --reload flag allows you to keep coding while Docker is running
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload